name: primark-local

services:
  web:
    container_name: primark-web-local
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8004:8000"
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis

  redis:
    container_name: primark-redis-local
    image: redis:7-alpine

  worker:
    container_name: primark-worker-local
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m arq app.workers.product_worker.Settings
    volumes:
      - .:/app
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
